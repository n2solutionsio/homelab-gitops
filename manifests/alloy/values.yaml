# Alloy Helm values — DaemonSet collector for k3s pod logs + syslog

controller:
  type: daemonset

alloy:
  mounts:
    varlog: true
  configMap:
    content: |
      // Discover Kubernetes pods
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Relabel to extract useful metadata
      discovery.relabel "pod_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_container_name"]
          separator     = "/"
          target_label  = "__path__"
          replacement   = "/var/log/pods/*$1/$2/$3/*.log"
        }
      }

      // Read pod log files
      loki.source.file "pod_logs" {
        targets               = discovery.relabel.pod_logs.output
        forward_to            = [loki.process.pod_logs.receiver]
      }

      // Parse CRI log format
      loki.process "pod_logs" {
        stage.cri {}
        forward_to = [loki.write.loki.receiver]
      }

      // Receive syslog from network devices (UDP, RFC 3164)
      loki.source.syslog "network" {
        listener {
          address       = "0.0.0.0:5514"
          protocol      = "udp"
          syslog_format = "rfc3164"
          labels        = { job = "syslog" }
        }
        forward_to = [loki.write.loki.receiver]
      }

      // Push to Loki via gateway
      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.logging.svc.cluster.local:80/loki/api/v1/push"
        }
      }

extraPorts:
  - name: syslog-udp
    port: 5514
    targetPort: 5514
    protocol: UDP
