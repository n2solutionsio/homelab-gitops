# Alloy Helm values — DaemonSet collector for k3s pod logs + syslog

controller:
  type: daemonset

alloy:
  mounts:
    varlog: true
  configMap:
    content: |
      // Find all pod log files on this node
      local.file_match "pod_logs" {
        path_targets = [{
          __path__ = "/var/log/pods/*/*/*.log",
        }]
      }

      // Read pod log files and add k8s labels via discovery
      loki.source.file "pod_logs" {
        targets    = local.file_match.pod_logs.targets
        forward_to = [loki.process.pod_logs.receiver]
      }

      // Parse CRI log format and extract labels from file path
      loki.process "pod_logs" {
        // Extract namespace, pod, uid, container from path
        stage.regex {
          expression = "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_(?P<uid>[^/]+)/(?P<container>[^/]+)/"
          source     = "filename"
        }
        stage.labels {
          values = {
            namespace = "",
            pod       = "",
            container = "",
          }
        }
        stage.cri {}
        stage.label_drop {
          values = ["uid"]
        }
        forward_to = [loki.write.loki.receiver]
      }

      // Receive syslog from network devices (UDP, RFC 3164)
      loki.source.syslog "network" {
        listener {
          address       = "0.0.0.0:5514"
          protocol      = "udp"
          syslog_format = "rfc3164"
          labels        = { job = "syslog" }
        }
        forward_to = [loki.write.loki.receiver]
      }

      // Push to Loki via gateway
      loki.write "loki" {
        endpoint {
          url = "http://loki-gateway.logging.svc.cluster.local:80/loki/api/v1/push"
        }
      }

extraPorts:
  - name: syslog-udp
    port: 5514
    targetPort: 5514
    protocol: UDP
