# Bitnami PostgreSQL Helm values — content metrics datastore
# Chart: bitnamicharts/postgresql 18.5.2

# Single instance (no replication — homelab)
architecture: standalone

auth:
  database: content_metrics
  existingSecret: postgresql-admin
  secretKeys:
    adminPasswordKey: password

# ClusterIP only — all consumers are in-cluster (kagent MCP, Orchestrator)
# For ad-hoc access: kubectl port-forward svc/postgresql 5432:5432 -n postgresql
primary:
  persistence:
    enabled: true
    storageClass: nfs-client
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  initdb:
    scriptsConfigMap: postgresql-init-schema
