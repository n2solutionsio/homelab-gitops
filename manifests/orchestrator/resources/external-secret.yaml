apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: orchestrator-secrets
  namespace: ai-org
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: orchestrator-secrets
    template:
      data:
        SLACK_BOT_TOKEN: "{{ .slack_bot_token }}"
        SLACK_SIGNING_SECRET: "{{ .slack_signing_secret }}"
        SLACK_APP_TOKEN: "{{ .slack_app_token }}"
        ANTHROPIC_API_KEY: "{{ .anthropic_api_key }}"
        GITHUB_TOKEN: "{{ .github_pat_token }}"
        DATABASE_URL: "postgresql://postgres:{{ .pg_password | urlquery }}@postgresql.postgresql.svc.cluster.local:5432/ai_org"
  data:
    - secretKey: slack_bot_token
      remoteRef:
        key: ai-org/slack
        property: bot-token
    - secretKey: slack_signing_secret
      remoteRef:
        key: ai-org/slack
        property: signing-secret
    - secretKey: slack_app_token
      remoteRef:
        key: ai-org/slack
        property: app-token
    - secretKey: anthropic_api_key
      remoteRef:
        key: ai-org/anthropic
        property: api-key
    - secretKey: github_pat_token
      remoteRef:
        key: ai-org/github
        property: pat-token
    - secretKey: pg_password
      remoteRef:
        key: postgres-admin
        property: password
