apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: ai-org
  labels:
    app: orchestrator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      imagePullSecrets:
        - name: ghcr-credentials
      containers:
        - name: orchestrator
          image: ghcr.io/n2solutionsio/orchestrator:latest
          envFrom:
            - secretRef:
                name: orchestrator-secrets
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: HEALTH_PORT
              value: "8080"
            - name: SLACK_COMMAND_CHANNEL
              value: "C0AK3S3ATD3"
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
