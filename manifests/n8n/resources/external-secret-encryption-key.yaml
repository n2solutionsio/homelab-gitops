apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-encryption-key
  namespace: n8n
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: n8n-encryption-key
  data:
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: n8n-encryption-key
        property: key
