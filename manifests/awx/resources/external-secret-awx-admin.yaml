apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: awx-admin-password
  namespace: awx
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: awx-admin-password
    template:
      data:
        password: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: awx-admin
        property: password
