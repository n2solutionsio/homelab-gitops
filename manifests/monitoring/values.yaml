# kube-prometheus-stack Helm values for homelab k3s cluster

# Disable k3s-incompatible default rules and specific alerts
defaultRules:
  rules:
    etcd: false
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
  disabled:
    KubeProxyDown: true
    KubeSchedulerDown: true
    KubeControllerManagerDown: true

# AlertManager with Slack notifications
alertmanager:
  enabled: true
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.homelab.n2solutions.io
    tls:
      - hosts:
          - alertmanager.homelab.n2solutions.io
  alertmanagerSpec:
    secrets:
      - alertmanager-slack-webhook
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: slack
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: "null"
          matchers:
            - alertname =~ "Watchdog|InfoInhibitor"
        - receiver: slack
          matchers:
            - severity = critical
          repeat_interval: 1h
        - receiver: slack
          matchers:
            - severity = warning
          repeat_interval: 4h
    receivers:
      - name: "null"
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
            channel: "#homelab-alerts"
            send_resolved: true
            title: '{{ if eq .Status "firing" }}:fire:{{ else }}:white_check_mark:{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              {{ range .Alerts }}
              *Alert:* {{ .Labels.alertname }} ({{ .Labels.severity }})

              *Description:* {{ .Annotations.description }}

              *Namespace:* {{ .Labels.namespace }}

              {{ end }}
    inhibit_rules:
      - source_matchers:
          - severity = critical
        target_matchers:
          - severity = warning
        equal: [alertname, namespace]
      - source_matchers:
          - severity = warning
        target_matchers:
          - severity = info
        equal: [alertname, namespace]

# Prometheus configuration
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
    # Discover ALL ServiceMonitors, not just chart-labeled ones
    serviceMonitorSelector:
      matchLabels: {}
    podMonitorSelector:
      matchLabels: {}

# Grafana configuration
grafana:
  sidecar:
    dashboards:
      searchNamespace: ALL
      folderAnnotation: grafana_folder
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    storageClassName: nfs-client
    size: 5Gi
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.logging.svc.cluster.local:80
      isDefault: false
      jsonData:
        maxLines: 1000
    - name: PostgreSQL
      type: postgres
      access: proxy
      url: postgresql.postgresql.svc.cluster.local:5432
      user: postgres
      database: content_metrics
      isDefault: false
      secureJsonData:
        password: $PG_PASSWORD
      jsonData:
        sslmode: disable
        postgresVersion: 1600
  envFromSecret: grafana-postgres-datasource
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.homelab.n2solutions.io
    tls:
      - hosts:
          - grafana.homelab.n2solutions.io
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: grafana-dashboards
          orgId: 1
          folder: Proxmox
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/grafana-dashboards
  dashboards:
    grafana-dashboards:
      proxmox-overview:
        gnetId: 10347
        revision: 5
        datasource:
          - name: DS_PROMETHEUS
            value: prometheus
      proxmox-fleet:
        gnetId: 24550
        revision: 1
        datasource:
          - name: DS_PROMETHEUS
            value: prometheus

# k3s doesn't expose these components via standard ServiceMonitor endpoints
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
