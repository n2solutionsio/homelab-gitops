apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-postgres-datasource
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: grafana-postgres-datasource
    template:
      data:
        PG_PASSWORD: "{{ .password }}"
  data:
    - secretKey: password
      remoteRef:
        key: postgres-admin/password
