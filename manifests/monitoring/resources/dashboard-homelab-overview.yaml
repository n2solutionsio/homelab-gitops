apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-homelab-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Homelab"
data:
  homelab-overview.json: |
    {
      "uid": "homelab-overview",
      "title": "Homelab Overview",
      "description": "Single pane of glass — cluster health, resource utilization, and security quick-look",
      "tags": ["homelab", "overview", "cluster"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "refresh": "1m",
      "links": [
        {
          "title": "Security Posture",
          "type": "link",
          "icon": "bolt",
          "url": "/d/security-posture",
          "targetBlank": false
        },
        {
          "title": "Firewall Activity",
          "type": "link",
          "icon": "shield",
          "url": "/d/unifi-firewall-activity",
          "targetBlank": false
        },
        {
          "title": "All Dashboards",
          "type": "link",
          "icon": "apps",
          "url": "/dashboards",
          "targetBlank": false
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "includeAll": false,
            "multi": false,
            "options": [],
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "Cluster Health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "collapsed": false
        },
        {
          "type": "stat",
          "title": "Node Status",
          "description": "Number of nodes in Ready state",
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 3 }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Running Pods",
          "description": "Total pods in Running phase",
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Pod Restarts (24h)",
          "description": "Total container restarts across the cluster in the last 24 hours",
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total[24h]))",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "unit": "none",
              "decimals": 0
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Failed Pods",
          "description": "Pods in Failed, Pending, or Unknown phase",
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=~\"Failed|Pending|Unknown\"}) OR vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              },
              "unit": "none"
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Critical Vulns",
          "description": "Total critical severity vulnerabilities detected by Trivy",
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(trivy_image_vulnerabilities{severity=\"Critical\"}) OR vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "none",
              "links": [
                {
                  "title": "Security Posture",
                  "url": "/d/security-posture",
                  "targetBlank": false
                }
              ]
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "stat",
          "title": "Falco Events (1h)",
          "description": "Critical/Error Falco runtime security events in the last hour",
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum(increase(falcosecurity_falcosidekick_falco_events_total{priority=~\"Emergency|Alert|Critical|Error\"}[1h])) OR vector(0)",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 10 }
                ]
              },
              "unit": "none",
              "decimals": 0,
              "links": [
                {
                  "title": "Security Posture",
                  "url": "/d/security-posture",
                  "targetBlank": false
                }
              ]
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "textMode": "auto"
          }
        },
        {
          "type": "row",
          "title": "Resource Utilization",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "collapsed": false
        },
        {
          "type": "gauge",
          "title": "Cluster CPU",
          "description": "Average CPU utilization across all nodes",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "type": "gauge",
          "title": "Cluster Memory",
          "description": "Memory utilization across all nodes",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "(1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "type": "gauge",
          "title": "Cluster Disk",
          "description": "Root filesystem utilization across all nodes",
          "gridPos": { "h": 6, "w": 8, "x": 16, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "(1 - sum(node_filesystem_avail_bytes{mountpoint=\"/\",fstype!=\"rootfs\"}) / sum(node_filesystem_size_bytes{mountpoint=\"/\",fstype!=\"rootfs\"})) * 100",
              "legendFormat": "",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 85 }
                ]
              },
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "type": "row",
          "title": "Detail Tables",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 12 },
          "collapsed": false
        },
        {
          "type": "table",
          "title": "Per-Node Resources",
          "description": "CPU%, Memory%, and pod count per node",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "(1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
              "legendFormat": "",
              "refId": "CPU",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "",
              "refId": "MEM",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "count by (node) (kube_pod_info)",
              "legendFormat": "",
              "refId": "PODS",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": {
                "byField": "instance"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true,
                  "Time 3": true
                },
                "renameByName": {
                  "instance": "Node",
                  "Value #CPU": "CPU %",
                  "Value #MEM": "Memory %",
                  "Value #PODS": "Pods"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 1,
              "custom": {
                "displayMode": "auto",
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "CPU %" },
                "properties": [
                  { "id": "unit", "value": "percent" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 70 },
                        { "color": "red", "value": 85 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background-solid" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Memory %" },
                "properties": [
                  { "id": "unit", "value": "percent" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "yellow", "value": 70 },
                        { "color": "red", "value": 85 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background-solid" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Pods" },
                "properties": [
                  { "id": "decimals", "value": 0 }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Node", "desc": false }],
            "footer": { "enablePagination": false }
          }
        },
        {
          "type": "table",
          "title": "Namespace Pod Health",
          "description": "Available vs desired replicas per namespace",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (namespace) (kube_deployment_status_replicas_available)",
              "legendFormat": "",
              "refId": "AVAIL",
              "instant": true,
              "format": "table"
            },
            {
              "expr": "sum by (namespace) (kube_deployment_spec_replicas)",
              "legendFormat": "",
              "refId": "DESIRED",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "seriesToColumns",
              "options": {
                "byField": "namespace"
              }
            },
            {
              "id": "calculateField",
              "options": {
                "mode": "binary",
                "binary": {
                  "left": "Value #AVAIL",
                  "operator": "/",
                  "right": "Value #DESIRED"
                },
                "alias": "Health %",
                "reduce": {
                  "reducer": "sum"
                }
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "Time 1": true,
                  "Time 2": true
                },
                "renameByName": {
                  "namespace": "Namespace",
                  "Value #AVAIL": "Available",
                  "Value #DESIRED": "Desired"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "decimals": 0,
              "custom": {
                "displayMode": "auto",
                "align": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Health %" },
                "properties": [
                  { "id": "unit", "value": "percentunit" },
                  { "id": "decimals", "value": 0 },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "red", "value": null },
                        { "color": "yellow", "value": 0.8 },
                        { "color": "green", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.displayMode", "value": "color-background-solid" }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "sortBy": [{ "displayName": "Namespace", "desc": false }],
            "footer": { "enablePagination": true }
          }
        },
        {
          "type": "row",
          "title": "Security Quick Look",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
          "collapsed": false
        },
        {
          "type": "barchart",
          "title": "Vulnerabilities by Severity",
          "description": "Current vulnerability count by severity — click to drill into Security Posture dashboard",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 22 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "targets": [
            {
              "expr": "sum by (severity) (trivy_image_vulnerabilities)",
              "legendFormat": "{{ severity }}",
              "refId": "A",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "renameByName": {
                  "severity": "Severity",
                  "Value": "Count"
                }
              }
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "links": [
                {
                  "title": "Security Posture",
                  "url": "/d/security-posture",
                  "targetBlank": false
                }
              ],
              "color": { "mode": "fixed", "fixedColor": "yellow" }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Critical" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "High" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Medium" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "yellow" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Low" },
                "properties": [
                  { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } }
                ]
              }
            ]
          },
          "options": {
            "orientation": "horizontal",
            "barWidth": 0.5,
            "groupWidth": 0.7,
            "showValue": "always",
            "stacking": "none",
            "legend": { "displayMode": "list", "placement": "right" },
            "tooltip": { "mode": "single" },
            "xTickLabelRotation": 0
          }
        }
      ]
    }
