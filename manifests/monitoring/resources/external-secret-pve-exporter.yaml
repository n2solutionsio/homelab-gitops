apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pve-exporter-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: pve-exporter-credentials
    template:
      data:
        PVE_USER: "automation@pve"
        PVE_TOKEN_NAME: "homelab"
        PVE_TOKEN_VALUE: "{{ .secret }}"
        PVE_VERIFY_SSL: "false"
  data:
    - secretKey: secret
      remoteRef:
        key: proxmox-automation-token-secret/Secret
