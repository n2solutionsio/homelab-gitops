apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-mcp-credentials
    template:
      data:
        UNIFI_API_KEY: "{{ .apikey }}"
  data:
    - secretKey: apikey
      remoteRef:
        key: unifi-mcp
        property: api-key
