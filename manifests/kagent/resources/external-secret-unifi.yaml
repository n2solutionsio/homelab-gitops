apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unifi-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: unifi-mcp-credentials
    template:
      data:
        UNIFI_API_KEY: "{{ .apikey }}"
        UNIFI_API_TYPE: "local"
        UNIFI_LOCAL_HOST: "192.168.1.1"
        UNIFI_LOCAL_PORT: "443"
        UNIFI_LOCAL_VERIFY_SSL: "false"
        LOG_LEVEL: "INFO"
  data:
    - secretKey: apikey
      remoteRef:
        key: unifi-mcp
        property: api-key
