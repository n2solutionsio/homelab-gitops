apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: argocd-mcp-credentials
    template:
      data:
        ARGOCD_BASE_URL: "{{ .url }}"
        ARGOCD_API_TOKEN: "{{ .token }}"
        MCP_READ_ONLY: "true"
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
  data:
    - secretKey: token
      remoteRef:
        key: argocd-mcp
        property: api-token
    - secretKey: url
      remoteRef:
        key: argocd-mcp
        property: url
