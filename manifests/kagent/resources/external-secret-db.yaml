apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-db-url
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: kagent-db-url
    template:
      data:
        url: "postgres://postgres:{{ .password | urlquery }}@postgresql.postgresql.svc.cluster.local:5432/kagent"
  data:
    - secretKey: password
      remoteRef:
        key: postgres-admin
        property: password
