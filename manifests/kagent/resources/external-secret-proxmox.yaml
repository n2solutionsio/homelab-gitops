apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: proxmox-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: proxmox-mcp-credentials
    template:
      data:
        PROXMOX_HOST: "{{ .host }}"
        PROXMOX_TOKEN_ID: "automation@pve!homelab"
        PROXMOX_TOKEN_SECRET: "{{ .secret }}"
        PROXMOX_VERIFY_SSL: "false"
  data:
    - secretKey: secret
      remoteRef:
        key: proxmox-automation-token-secret
        property: Secret
    - secretKey: host
      remoteRef:
        key: proxmox-automation-token-secret
        property: host
