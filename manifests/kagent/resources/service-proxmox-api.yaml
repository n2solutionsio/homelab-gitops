# Headless Service + Endpoints for Proxmox VE API
# Maps generic name "proxmox-api" to actual Proxmox host IP.
# Change the IP in Endpoints to point to your own Proxmox instance.
apiVersion: v1
kind: Service
metadata:
  name: proxmox-api
  namespace: kagent
spec:
  ports:
    - port: 8006
      targetPort: 8006
      protocol: TCP
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: proxmox-api
  namespace: kagent
subsets:
  - addresses:
      - ip: 192.168.1.68
    ports:
      - port: 8006
        protocol: TCP
