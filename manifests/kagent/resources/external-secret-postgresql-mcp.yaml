apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: postgresql-mcp-credentials
    template:
      data:
        DATABASE_URI: "postgresql://postgres:{{ .password | urlquery }}@postgresql.postgresql.svc.cluster.local:5432/ai_org"
  data:
    - secretKey: password
      remoteRef:
        key: postgres-admin
        property: password
