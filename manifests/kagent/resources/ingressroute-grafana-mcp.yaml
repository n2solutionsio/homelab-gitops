# Traefik IngressRoute to expose grafana-mcp-server for Claude Code access.
# kMCP creates a Service named after the MCPServer CRD — verify the actual
# service name and port after deployment with:
#   kubectl get svc -n kagent | grep grafana
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-mcp
  namespace: kagent
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`grafana-mcp.homelab.n2solutions.io`)"
      kind: Rule
      services:
        - name: grafana-mcp-server
          port: 8000
  tls: {}
