apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: unifi-mcp-server
  namespace: kagent
spec:
  deployment:
    image: ghcr.io/enuno/unifi-mcp-server:0.2.4
    cmd: /opt/venv/bin/python
    args:
      - -c
      - "from src.main import mcp; mcp.run(transport='streamable-http', host='0.0.0.0', port=8000)"
    port: 8000
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    secretRefs:
      - name: unifi-mcp-credentials
  transportType: http
  httpTransport:
    targetPort: 8000
    path: /mcp/
  timeout: 90s
