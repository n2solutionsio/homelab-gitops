# Traefik IngressRoute to expose proxmox-mcp-server for Claude Code access.
# kMCP creates a Service named after the MCPServer CRD — verify the actual
# service name and port after deployment with:
#   kubectl get svc -n kagent | grep proxmox
#
# NOTE: If kMCP doesn't expose an HTTP endpoint for stdio-mode MCPServers,
# this IngressRoute won't work and we'll need to switch to transportType: HTTP
# or deploy a separate HTTP-mode instance.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: proxmox-mcp
  namespace: kagent
spec:
  entryPoints:
    - websecure
  routes:
    - match: "Host(`proxmox-mcp.homelab.n2solutions.io`)"
      kind: Rule
      services:
        - name: proxmox-mcp-server
          port: 8000
  tls: {}
