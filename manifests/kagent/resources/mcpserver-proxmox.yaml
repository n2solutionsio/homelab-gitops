apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: proxmox-mcp-server
  namespace: kagent
spec:
  deployment:
    image: puregrain/proxmox-emcp:latest
    cmd: python3
    args:
      - mcp_server_stdio.py
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    secretRefs:
      - name: proxmox-mcp-credentials
  transportType: stdio
  timeout: 30s
