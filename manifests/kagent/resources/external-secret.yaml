apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-anthropic
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: kagent-anthropic
  data:
    - secretKey: api-key
      remoteRef:
        key: ai-org/anthropic
        property: api-key
