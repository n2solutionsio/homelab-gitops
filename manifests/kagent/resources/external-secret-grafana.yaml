apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-mcp-credentials
  namespace: kagent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-mcp-credentials
    template:
      data:
        GRAFANA_URL: "{{ .url }}"
        GRAFANA_SERVICE_ACCOUNT_TOKEN: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: grafana-admin
        property: service-account-token
    - secretKey: url
      remoteRef:
        key: grafana-admin
        property: url
