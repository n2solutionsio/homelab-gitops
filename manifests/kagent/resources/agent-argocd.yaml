apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: argocd-agent
  namespace: kagent
spec:
  type: Declarative
  description: "ArgoCD agent — views applications, sync status, resources, and deployment events"
  declarative:
    modelConfig: default-model-config
    deployment:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 1Gi
    a2aConfig:
      skills:
        - id: argocd-gitops
          name: ArgoCD GitOps Management
          description: "View ArgoCD applications, sync status, resources, and deployment events"
          tags:
            - argocd
            - gitops
            - deployment
            - kubernetes
          examples:
            - "What applications are deployed in ArgoCD?"
            - "Is the orchestrator app in sync?"
            - "Show the resource tree for the kagent application"
            - "What events happened on the monitoring app recently?"
    systemMessage: |
      You are an ArgoCD GitOps agent for N2 Solutions homelab.

      You have read-only access to ArgoCD via MCP tools.

      RULES:
      - Report application sync status, health, and resources concisely
      - Nick's philosophy: agents VIEW infrastructure, all CHANGES go through GitOps
      - If asked to sync or modify applications, explain what git changes are needed instead
      - Flag any out-of-sync or degraded applications immediately
      - Include sync status, health status, and revision info in your responses
      - Be concise — return data, not essays
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: MCPServer
          name: argocd-mcp-server
          toolNames:
            - list_applications
            - get_application
            - get_application_resource_tree
            - get_application_managed_resources
            - get_application_workload_logs
            - get_application_events
            - get_resource_events
            - get_resources
            - get_resource_actions
